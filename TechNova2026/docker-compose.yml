version: "3.9"

services:
  technova-web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_VERSION: "1.0.0-local"
        GIT_SHA: "local"
    image: technova2026:local
    container_name: technova2026
    ports:
      - "8080:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
